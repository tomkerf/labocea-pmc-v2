<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="#EEF1F3"/>

  <!-- Green leaf — tip upper-left, curves down-right -->
  <path d="
    M 38 22
    C 20 22, 18 42, 22 54
    C 26 66, 36 72, 46 68
    C 54 65, 56 56, 52 46
    C 48 34, 42 22, 38 22
    Z
  " fill="#34C172"/>

  <!-- Blue water drop — tip upper-right, round belly lower-left -->
  <path d="
    M 62 22
    C 66 30, 72 40, 72 52
    A 16 16 0 0 1 40 52
    C 40 40, 52 28, 62 22
    Z
  " fill="#3B9EF5"/>

  <!-- Small overlap highlight where leaf meets drop — gives depth -->
  <path d="
    M 52 46
    C 50 52, 48 58, 46 68
    C 50 66, 54 60, 56 52
    C 57 48, 55 44, 52 46
    Z
  " fill="#28A5C0" opacity="0.5"/>
</svg>
